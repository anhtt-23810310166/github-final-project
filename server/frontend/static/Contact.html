<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        /* Navigation Bar */
        .navbar {
            background-color: #212529;
            padding: 15px 30px;
            display: flex;
            gap: 20px;
        }
        .navbar a {
            color: #a5a5a5;
            text-decoration: none;
            font-weight: 500;
        }
        .navbar a:hover {
            color: #fff;
        }
        .navbar a.active {
            color: #fff;
            font-weight: bold;
            border-bottom: 2px solid #007bff;
        }
        /* Content */
        .contact-container {
            background: #html;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 50px auto;
        }
        h1 {
            color: #007bff;
            margin-bottom: 25px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }
        .contact-info {
            margin-top: 15px;
            font-size: 1.1em;
            line-height: 1.6;
        }
        .contact-item {
            margin-bottom: 15px;
        }
        .label {
            font-weight: bold;
            color: #495057;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="#">Home</a>
    <a href="./About.html">About Us</a>
    <a href="./Contact.html" class="active">Contact Us</a>
</div>

<div class="contact-container">
    <h1>Contact Us</h1>
    <p>Have questions or need assistance? Reach out to our support team through the information below:</p>
    
    <div class="contact-info">
        <div class="contact-item">
            <span class="label">Customer Support Email:</span> <br>
            <a href="mailto:support@cardealership.com" style="color: #007bff; text-decoration: none;">support@cardealership.com</a>
        </div>
        <div class="contact-item">
            <span class="label">Phone Number:</span> <br>
            +1 (800) 555-0199
        </div>
        <div class="contact-item">
            <span class="label">Headquarters Address:</span> <br>
            100 Innovation Way, Suite 400, Austin, TX 78701
        </div>
    </div>
</div>

</body>
</html>
